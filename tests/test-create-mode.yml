name: Test create mode input validation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REPOSITORY: test-owner/test-repo
      GITHUB_REPOSITORY_OWNER_ID: "0"
      GITHUB_REPOSITORY_ID: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Test create mode with invalid name (hostname validation)
        id: action-invalid-name
        uses: .
        continue-on-error: true
        with:
          mode: create
          github_token: fake-github-token
          hcloud_token: fake-hcloud-token
          name: "invalid name with spaces!"
          pre_runner_script: "echo hello"
      - name: Assert invalid name was rejected
        env:
          OUTCOME: ${{ steps.action-invalid-name.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid name"
            exit 1
          fi
          echo "PASS: action correctly rejected invalid name"
