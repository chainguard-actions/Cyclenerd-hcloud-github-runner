name: Test create mode (input validation)
on:
  workflow_dispatch:
jobs:
  test-create-mode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          mode: create
          github_token: fake-github-token
          hcloud_token: fake-hcloud-token
          name: test-runner-ci
          pre_runner_script: echo "pre-runner setup"
          image: ubuntu-24.04
          location: nbg1
          server_type: cx23
        env:
          GITHUB_REPOSITORY: test-owner/test-repo
      - name: Assert action failed due to invalid API credentials
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with fake credentials, got outcome '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed with fake credentials"
