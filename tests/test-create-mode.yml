name: Test create mode input coverage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REPOSITORY: test-owner/test-repo
      GITHUB_REPOSITORY_OWNER_ID: "0"
      GITHUB_REPOSITORY_ID: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          github_token: fake-github-token
          hcloud_token: fake-hcloud-token
          mode: create
          name: test-runner-1
          pre_runner_script: "echo 'pre-runner script executed'"
          runner_wait: "1"
          server_wait: "1"
          create_wait: "1"
      - name: Assert action failed at API call not at input validation
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action should fail because of invalid API tokens, not input validation
          # Input validation passes when inputs are well-formed
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail (no real API tokens provided)"
            exit 1
          fi
          echo "PASS: action failed as expected (API call with fake tokens)"
