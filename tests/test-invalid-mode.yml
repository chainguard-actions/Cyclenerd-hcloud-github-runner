name: Test invalid mode rejection
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REPOSITORY: test-owner/test-repo
      GITHUB_REPOSITORY_OWNER_ID: "0"
      GITHUB_REPOSITORY_ID: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Test invalid mode value
        id: action-invalid-mode
        uses: .
        continue-on-error: true
        with:
          mode: invalid-mode
          github_token: fake-github-token
          hcloud_token: fake-hcloud-token
          name: test-runner
          server_id: "12345"
          pre_runner_script: "echo setup"
      - name: Assert invalid mode was rejected
        env:
          OUTCOME: ${{ steps.action-invalid-mode.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid mode"
            exit 1
          fi
          echo "PASS: action correctly rejected invalid mode"
