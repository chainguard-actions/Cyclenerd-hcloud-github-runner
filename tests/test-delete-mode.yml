name: Test delete mode input validation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REPOSITORY: test-owner/test-repo
      GITHUB_REPOSITORY_OWNER_ID: "0"
      GITHUB_REPOSITORY_ID: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Test delete mode with invalid server_id (non-integer)
        id: action-invalid-server-id
        uses: .
        continue-on-error: true
        with:
          mode: delete
          github_token: fake-github-token
          hcloud_token: fake-hcloud-token
          name: test-runner
          server_id: "not-an-integer"
          pre_runner_script: "echo cleanup"
      - name: Assert invalid server_id was rejected
        env:
          OUTCOME: ${{ steps.action-invalid-server-id.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid server_id"
            exit 1
          fi
          echo "PASS: action correctly rejected invalid server_id"
