name: Test invalid mode is rejected
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REPOSITORY: test-owner/test-repo
      GITHUB_REPOSITORY_OWNER_ID: "0"
      GITHUB_REPOSITORY_ID: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          mode: invalid-mode
          github_token: fake-github-token-for-testing
          hcloud_token: fake-hcloud-token-for-testing
      - name: Assert action failed due to invalid mode
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid mode, got '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly rejected invalid mode value"
