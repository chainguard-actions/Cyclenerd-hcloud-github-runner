name: Test delete mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          mode: delete
          github_token: fake-github-token
          hcloud_token: fake-hcloud-token
          name: test-runner-delete
          server_id: '12345678'
          pre_runner_script: 'echo "pre-runner setup"'
          image: ubuntu-24.04
          location: nbg1
          server_type: cx22
          enable_ipv4: 'true'
          enable_ipv6: 'true'
          runner_version: latest
          runner_dir: /actions-runner
          create_wait: '1'
          server_wait: '1'
          runner_wait: '1'
      - name: Assert action was invoked
        run: |
          echo "Action step completed (with or without error due to fake tokens)"
          echo "outcome: ${{ steps.action.outcome }}"
          # The action is expected to fail with fake tokens, but it must have been invoked
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action step was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action was invoked"
